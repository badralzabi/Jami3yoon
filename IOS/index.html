<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="/IOS/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="تطبيق مبادرة جامعيون">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <meta name="apple-mobile-web-app-title" content="جامعيون">
  
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>جامعيون</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0175C2; /* نفس لون الخلفية الأساسي لتطبيق فلاتر */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }
    
    /* حاوية لعناصر التحميل */
    .loading-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* تصميم مؤشر التحميل (Spinner) */
    .loader {
      border: 6px solid rgba(255, 255, 255, 0.3); /* إطار خلفي باهت */
      border-top: 6px solid #ffffff; /* الإطار الدوار */
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    /* أنيميشن الدوران */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loader"></div>
    </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
