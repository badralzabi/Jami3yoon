<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعيون – روابطنا</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004d9c;
            --secondary: #0077c2;
            --accent: #ff7f50;
            --bg: #f0f6ff;
            --card-bg: #ffffff;
            --card-border: #d7eefb;
            --text: #1f2937;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            direction: rtl;
            color: var(--text);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(0,119,194,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,77,156,0.06) 0%, transparent 50%);
        }

        .page {
            max-width: 480px;
            margin: 0 auto;
            padding: 2.5rem 1.2rem 3rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .logo-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-inner {
            width: 94px;
            height: 94px;
            border-radius: 50%;
            background: var(--card-bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-placeholder {
            font-size: 42px;
            line-height: 1;
        }

        #logo-upload { display: none; }

        .org-name {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .org-bio {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 400;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 13px 16px;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            cursor: pointer;
            animation: fadeUp 0.4s ease both;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 77, 156, 0.12);
            border-color: rgba(0, 119, 194, 0.35);
        }

        .link-card:active { transform: scale(0.98); }

        .link-card:nth-child(1) { animation-delay: 0.05s; }
        .link-card:nth-child(2) { animation-delay: 0.10s; }
        .link-card:nth-child(3) { animation-delay: 0.15s; }
        .link-card:nth-child(4) { animation-delay: 0.20s; }
        .link-card:nth-child(5) { animation-delay: 0.25s; }
        .link-card:nth-child(6) { animation-delay: 0.30s; }
        .link-card:nth-child(7) { animation-delay: 0.35s; }
        .link-card:nth-child(8) { animation-delay: 0.40s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-wrap {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-wrap svg { display: block; }

        .link-info { flex: 1; }

        .link-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
        }

        .link-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 400;
        }

        .arrow-icon {
            color: #b5d4f4;
            font-size: 20px;
            flex-shrink: 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 4px;
            animation: fadeUp 0.4s ease 0.22s both;
        }
        .divider span {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--card-border);
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>

<script>
    const upload = document.getElementById('logo-upload');
    upload.addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const display = document.getElementById('logo-display');
            display.innerHTML = '';
            const img = document.createElement('img');
            img.src = e.target.result;
            img.alt = 'شعار جامعيون';
            display.appendChild(img);
        };
        reader.readAsDataURL(file);
    });

  
</script>
